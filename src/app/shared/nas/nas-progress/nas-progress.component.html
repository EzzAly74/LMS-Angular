<div class="nas-progress" [attr.data-tone]="tintValue ? resolvedTone() : null">
  <div class="nas-progress__track">
    <div class="nas-progress__fill"
         [style.width.%]="clamped()"
         [attr.data-tone]="resolvedTone()"></div>
  </div>
  @if (showValue) { <span class="nas-progress__value">{{ clamped() }}%</span> }
</div>
