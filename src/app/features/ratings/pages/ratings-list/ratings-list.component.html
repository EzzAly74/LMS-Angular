<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <h2 class="text-2xl font-semibold text-900 m-0">Ratings</h2>
  </div>

  <!-- Filters -->
  <div class="surface-card border-round-xl shadow-1 p-3 mb-3 flex gap-3 flex-wrap align-items-center">
    <p-dropdown
      [options]="courseOptions()"
      [(ngModel)]="selectedCourseId"
      optionLabel="title"
      optionValue="id"
      placeholder="Filter by course"
      [showClear]="true"
      (onChange)="onFilterChange()"
      [style]="{ 'min-width': '220px' }"
    />
    <span class="p-input-icon-left">
      <i class="pi pi-search"></i>
      <input
        class="p-inputtext p-component p-element"
        placeholder="Search learner..."
        (input)="onSearch($event)"
      />
    </span>
  </div>

  <div class="surface-card border-round-xl shadow-1 overflow-hidden">
    <p-table
      [value]="items()"
      [loading]="loading()"
      [lazy]="true"
      [paginator]="true"
      [rows]="perPage"
      [totalRecords]="total()"
      (onLazyLoad)="onPage($event)"
      [rowHover]="true"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Learner</th>
          <th>Course</th>
          <th>Rating</th>
          <th>Comment</th>
          <th>Date</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td class="font-medium">{{ item.user_name }}</td>
          <td>{{ item.course_title }}</td>
          <td>
            <div class="flex gap-1 align-items-center">
              @for (star of starsArray; track $index) {
                <i [class]="$index < item.rating ? 'pi pi-star-fill text-yellow-400' : 'pi pi-star text-color-secondary'" style="font-size:.9rem"></i>
              }
              <span class="text-sm text-color-secondary ml-1">({{ item.rating }}/5)</span>
            </div>
          </td>
          <td class="text-color-secondary text-sm" style="max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">
            {{ item.comment ?? '—' }}
          </td>
          <td class="text-color-secondary text-sm">{{ item.created_at | date:'mediumDate' }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="5" class="text-center p-4 text-color-secondary">No ratings found.</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
