<p-confirmDialog />

<!-- Create / Edit Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="editingId ? 'Edit Qualification' : 'New Qualification'"
  [modal]="true"
  [style]="{ width: '460px' }"
>
  <div class="flex flex-column gap-3 pt-2">
    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Name (English) <span class="text-red-500">*</span></label>
      <input pInputText [(ngModel)]="form.name_en" placeholder="Enter English name" class="w-full" />
    </div>
    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Name (Arabic) <span class="text-red-500">*</span></label>
      <input pInputText [(ngModel)]="form.name_ar" placeholder="Enter Arabic name" dir="rtl" class="w-full" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" size="small" (onClick)="closeDialog()" />
    <p-button [label]="editingId ? 'Update' : 'Create'" size="small" [loading]="saving()" (onClick)="save()" />
  </ng-template>
</p-dialog>

<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <h2 class="text-2xl font-semibold text-900 m-0">Qualifications</h2>
    <p-button icon="pi pi-plus" label="Add Qualification" size="small" (onClick)="openCreate()" />
  </div>

  <div class="surface-card border-round-xl shadow-1 overflow-hidden">
    <div class="p-3 border-bottom-1 surface-border">
      <span class="p-input-icon-left w-full md:w-20rem">
        <i class="pi pi-search"></i>
        <input pInputText placeholder="Search qualifications..." (input)="onSearch($event)" class="w-full" />
      </span>
    </div>

    <p-table
      [value]="items()"
      [loading]="loading()"
      [lazy]="true"
      [paginator]="true"
      [rows]="perPage"
      [totalRecords]="total()"
      (onLazyLoad)="onPage($event)"
      [rowHover]="true"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Name (EN)</th>
          <th>Name (AR)</th>
          <th>Courses</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td class="font-medium">{{ item.name_en ?? item.name }}</td>
          <td dir="rtl">{{ item.name_ar ?? item.name }}</td>
          <td>{{ item.courses_count ?? 0 }}</td>
          <td>
            <div class="flex gap-2">
              <p-button icon="pi pi-pencil" size="small" severity="secondary" [text]="true" (onClick)="openEdit(item)" />
              <p-button icon="pi pi-trash" size="small" severity="danger" [text]="true" (onClick)="confirmDelete(item)" />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="4" class="text-center p-4 text-color-secondary">No qualifications found.</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
