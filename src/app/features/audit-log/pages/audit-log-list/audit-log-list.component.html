<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <h2 class="text-2xl font-semibold text-900 m-0">Audit Log</h2>
  </div>

  <!-- Date Range Filters -->
  <div class="surface-card border-round-xl shadow-1 p-3 mb-3 flex gap-3 flex-wrap align-items-center">
    <div class="flex align-items-center gap-2">
      <label class="text-sm text-color-secondary">From:</label>
      <p-calendar
        [(ngModel)]="dateFrom"
        [showIcon]="true"
        dateFormat="yy-mm-dd"
        placeholder="Start date"
        (onSelect)="onDateChange()"
        [style]="{ width: '180px' }"
      />
    </div>
    <div class="flex align-items-center gap-2">
      <label class="text-sm text-color-secondary">To:</label>
      <p-calendar
        [(ngModel)]="dateTo"
        [showIcon]="true"
        dateFormat="yy-mm-dd"
        placeholder="End date"
        (onSelect)="onDateChange()"
        [style]="{ width: '180px' }"
      />
    </div>
    @if (dateFrom || dateTo) {
      <p-button icon="pi pi-times" label="Clear" severity="secondary" size="small" [text]="true" (onClick)="clearDates()" />
    }
  </div>

  <div class="surface-card border-round-xl shadow-1 overflow-hidden">
    <p-table
      [value]="items()"
      [loading]="loading()"
      [lazy]="true"
      [paginator]="true"
      [rows]="perPage"
      [totalRecords]="total()"
      (onLazyLoad)="onPage($event)"
      [rowHover]="true"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>User</th>
          <th>Action</th>
          <th>Description</th>
          <th>IP Address</th>
          <th>Date</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td>
            <div class="font-medium text-sm">{{ item.user_name }}</div>
            @if (item.user_email) {
              <div class="text-color-secondary text-xs">{{ item.user_email }}</div>
            }
          </td>
          <td>
            <span class="font-mono text-sm surface-ground border-round px-2 py-1">{{ item.action }}</span>
          </td>
          <td class="text-sm" style="max-width:350px">{{ item.description }}</td>
          <td class="text-color-secondary text-sm font-mono">{{ item.ip_address ?? '—' }}</td>
          <td class="text-color-secondary text-sm">{{ item.created_at | date:'medium' }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="5" class="text-center p-4 text-color-secondary">No audit log entries found.</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
