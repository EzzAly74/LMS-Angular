<!-- Assign Qualifications Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="'Assign Qualifications — ' + (selectedJobTitle()?.name ?? '')"
  [modal]="true"
  [style]="{ width: '500px' }"
  [closable]="true"
>
  <div class="flex flex-column gap-3 pt-2">
    <label class="font-medium text-sm">Select Qualifications</label>
    <p-multiSelect
      [options]="allQualifications()"
      [(ngModel)]="selectedQualIds"
      optionLabel="name"
      optionValue="id"
      placeholder="Choose qualifications..."
      [filter]="true"
      class="w-full"
    />
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" size="small" (onClick)="closeDialog()" />
    <p-button label="Save" size="small" [loading]="saving()" (onClick)="saveQualifications()" />
  </ng-template>
</p-dialog>

<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <h2 class="text-2xl font-semibold text-900 m-0">Job Titles</h2>
  </div>

  <div class="surface-card border-round-xl shadow-1 overflow-hidden">
    <p-table
      [value]="items()"
      [loading]="loading()"
      [lazy]="true"
      [paginator]="true"
      [rows]="perPage"
      [totalRecords]="total()"
      (onLazyLoad)="onPage($event)"
      [rowHover]="true"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>#</th>
          <th>Job Title</th>
          <th>Qualifications</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
        <tr>
          <td class="text-color-secondary">{{ rowIndex + 1 }}</td>
          <td class="font-medium">{{ item.name }}</td>
          <td>
            <span class="text-color-secondary text-sm">{{ item.qualifications_count ?? item.qualifications?.length ?? 0 }} assigned</span>
          </td>
          <td>
            <p-button
              icon="pi pi-link"
              label="Assign Qualifications"
              size="small"
              severity="secondary"
              [text]="true"
              (onClick)="openDialog(item)"
            />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="4" class="text-center p-4 text-color-secondary">No job titles found.</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
