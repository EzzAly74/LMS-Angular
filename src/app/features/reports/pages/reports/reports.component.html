<div class="nas-page-container">
  <nas-page-header title="Reports" subtitle="Generate and export data reports as CSV">
  </nas-page-header>
  <div class="reports-grid">
    @for (report of reportTypes; track report.key) {
      <div class="report-card">
        <div class="report-card__icon-wrap">
          <i [class]="report.icon"></i>
        </div>
        <div>
          <div class="report-card__title">{{ report.label }}</div>
          <div class="report-card__desc">{{ report.description }}</div>
        </div>
        <button type="button" class="report-card__btn" (click)="exportCsv(report.key)" [disabled]="downloading()[report.key] ?? false">
          @if (downloading()[report.key]) {
            <i class="pi pi-spin pi-spinner"></i>
          } @else {
            <i class="pi pi-download"></i>
          }
          Generate &amp; Export CSV
        </button>
      </div>
    }
  </div>
</div>
